<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta
        name="robots"
        content="noindex, nofollow"
    >

    <title>ReLife CMS</title>

    <link
        rel="stylesheet"
        href="/admin/admin.css"
    >

    <script
        src="/admin/admin-app.js"
        defer
    ></script>
</head>

<body class="admin-page">

<header class="admin-header">

    <div>
        <h1>ReLife CMS</h1>

        <p class="admin-subtitle">
            Clinic Content Management
        </p>
    </div>

    <div class="admin-user">

        <span id="current-user">
            Loading...
        </span>

        <button
            id="logout-button"
            class="secondary-button"
            type="button"
        >
            Logout
        </button>

    </div>

</header>

<main class="admin-main">

    <section class="admin-card">

        <h2>
            Dashboard
        </h2>

        <p>

            Authentication succeeded.

        </p>

        <p>

            Next step:

        </p>

        <ul>

            <li>Article Management</li>

            <li>Patient Stories</li>

            <li>Media Upload</li>

            <li>Publish</li>

        </ul>

    </section>

</main>

</html>
