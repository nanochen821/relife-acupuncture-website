<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="robots" content="noindex, nofollow">

    <title>ReLife CMS</title>

    <link rel="stylesheet" href="/admin/admin.css">

    <script src="/admin/admin-app.js" defer></script>
</head>

<body class="admin-page">

    <header class="admin-header">

        <div>
            <h1>ReLife CMS</h1>

            <p class="admin-subtitle">
                Clinic Content Management
            </p>
        </div>

        <div class="admin-user">

            <span id="current-user">
                Loading...
            </span>

            <button id="logout-button" class="secondary-button" type="button">
                Logout
            </button>

        </div>

    </header>

    <main class="admin-main">
        <section class="admin-card">
            <div class="section-heading">
                <div>
                    <p class="section-eyebrow">
                        Content
                    </p>

                    <h2>
                        Article Management
                    </h2>

                    <p class="section-description">
                        查看目前已發布的健康文章。
                    </p>
                </div>
            </div>

            <div id="article-status" class="content-status" aria-live="polite">
                正在載入文章...
            </div>

            <div id="article-list" class="article-list" hidden></div>
        </section>
    </main>
</body>

</html>
